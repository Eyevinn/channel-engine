name: Publish release candidate

on:
  release:
    types: [prereleased]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: |
          npm ci
          npm run build
          npm publish --tag rc
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
